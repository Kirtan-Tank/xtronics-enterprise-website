<svg width="100%" viewBox="0 0 690 530" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Everloom Labs</title>

  <!-- No background — transparent -->

  <circle cx="574" cy="88" r="5" fill="#7B4FBF" opacity="0.65"/>

  <g transform="translate(340,205)">

    <!-- Outer diffuse halo rings -->
    <g transform="rotate(0)">  <ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>
    <g transform="rotate(30)"> <ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>
    <g transform="rotate(60)"> <ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>
    <g transform="rotate(90)"> <ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>
    <g transform="rotate(120)"><ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>
    <g transform="rotate(150)"><ellipse cx="0" cy="0" rx="68" ry="105" fill="none" stroke="#9B6FD4" stroke-width="1.2" opacity="0.18"/></g>

    <!-- Core rings -->
    <g transform="rotate(0)">  <ellipse cx="0" cy="0" rx="60" ry="95" fill="none" stroke="#4A2280" stroke-width="3.5" opacity="0.75"/></g>
    <g transform="rotate(36)"> <ellipse cx="0" cy="0" rx="60" ry="95" fill="none" stroke="#6B3DAF" stroke-width="3.5" opacity="0.78"/></g>
    <g transform="rotate(72)"> <ellipse cx="0" cy="0" rx="60" ry="95" fill="none" stroke="#8855CC" stroke-width="3.5" opacity="0.80"/></g>
    <g transform="rotate(108)"><ellipse cx="0" cy="0" rx="60" ry="95" fill="none" stroke="#9B6FD4" stroke-width="3.5" opacity="0.80"/></g>
    <g transform="rotate(144)"><ellipse cx="0" cy="0" rx="60" ry="95" fill="none" stroke="#C4A4EE" stroke-width="3.5" opacity="0.70"/></g>

    <!-- Accent rings -->
    <g transform="rotate(18)"> <ellipse cx="0" cy="0" rx="56" ry="88" fill="none" stroke="#B48EE0" stroke-width="2" opacity="0.55"/></g>
    <g transform="rotate(54)"> <ellipse cx="0" cy="0" rx="56" ry="88" fill="none" stroke="#7B4FBF" stroke-width="2" opacity="0.50"/></g>
    <g transform="rotate(90)"> <ellipse cx="0" cy="0" rx="56" ry="88" fill="none" stroke="#D0B8F0" stroke-width="2" opacity="0.45"/></g>
    <g transform="rotate(126)"><ellipse cx="0" cy="0" rx="56" ry="88" fill="none" stroke="#9B6FD4" stroke-width="2" opacity="0.50"/></g>
    <g transform="rotate(162)"><ellipse cx="0" cy="0" rx="56" ry="88" fill="none" stroke="#C4A4EE" stroke-width="2" opacity="0.40"/></g>

    <!-- Centre dot — outer matches footer dark so rings don't bleed through -->
    <circle cx="0" cy="0" r="6.5" fill="#0D0D0D"/>
    <circle cx="0" cy="0" r="4.5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="2"   fill="#C4A4EE"/>

  </g>

  <!-- EVERLOOM wordmark — near-white -->
  <text x="340" y="340" text-anchor="middle"
    font-family="Raleway, sans-serif" font-size="34" font-weight="300"
    fill="rgb(237,237,237)">EVERLOOM</text>

  <!-- LABS — light amethyst -->
  <text x="340" y="364" text-anchor="middle"
    font-family="Raleway, sans-serif" font-size="11" font-weight="300"
    fill="rgb(160,125,212)">LABS</text>

</svg>
