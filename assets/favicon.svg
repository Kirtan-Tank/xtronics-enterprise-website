<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="7" fill="#0D0D0D"/>

  <!-- X arms -->
  <line x1="7"  y1="7"  x2="25" y2="25" stroke="#D32F2F" stroke-width="3.8" stroke-linecap="round"/>
  <line x1="25" y1="7"  x2="7"  y2="25" stroke="#D32F2F" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Circuit nodes at four tips -->
  <circle cx="7"  cy="7"  r="2.2" fill="#D32F2F"/>
  <circle cx="25" cy="7"  r="2.2" fill="#D32F2F"/>
  <circle cx="7"  cy="25" r="2.2" fill="#D32F2F"/>
  <circle cx="25" cy="25" r="2.2" fill="#D32F2F"/>

  <!-- Centre ring (PCB via style) -->
  <circle cx="16" cy="16" r="3"   fill="#0D0D0D"/>
  <circle cx="16" cy="16" r="3"   fill="none" stroke="#D32F2F" stroke-width="1.6"/>
</svg>
